<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4">ClimaX Controller</span>
        </a>
        <ul class="nav nav-pills">
            <li class="nav-item"><a href="index.html" class="nav-link" aria-current="page">Inici</a></li>
            <li class="nav-item"><a href="documentation.html" class="nav-link" aria-current="page">Documentació</a></li>
            <li class="nav-item" id="dashboard-link"><a href="dashboard.html" class="nav-link active"
                    aria-current="page">Dashboard</a></li>
            <li class="nav-item"><a href="login.html" class="nav-link" aria-current="page">Inicia Sessió</a></li>
        </ul>
    </header>

    <div class="container">
        <div class="row">

            <div id="map-section" class="col-12 col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Mapa de sensors</h5>
                        <div id="map" style="height: 400px; background-color: #e9ecef;"></div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Lectures del sensor</h5>
                        <canvas id="chart"></canvas>
                    </div>
                </div>
            <table class="table mt-3" id="sensor-table">
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Temperatura</th>
                        <th>Humitat</th>
                        <th>Pressió</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            </div>

            <div id="admin-section" class="row mt-4">
                <div class="col-12">
                    <div class="card d-none" id="admin-panel">
                        <div class="card-body">
                            <h5 class="card-title">Gestió d'usuaris (Només administradors)</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <footer class="py-3 my-4">
            <hr>
            </hr>
            <p class="text-center text-body-secondary">© 2025-2026 ClimaX Controller</p>
        </footer>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
