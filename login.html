<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4">ClimaX Controller</span>
        </a>
        <ul class="nav nav-pills">
            <li class="nav-item"><a href="index.html" class="nav-link" aria-current="page">Inici</a></li>
            <li class="nav-item"><a href="documentation.html" class="nav-link">Documentació</a></li>
            <li class="nav-item d-none" id="dashboard-link"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
            <li class="nav-item active"><a href="login.html" class="nav-link">Inicia Sessió</a></li>
        </ul>
    </header>

    <main class="form-signin text-center">

        <div class="text-start mb-3 ms-4">
            <a href="index.html" class="text-decoration-none">
                ← Tornar a inici
            </a>
        </div>

        <form style="max-width: 330px; margin: auto;">

            <h1 class="h3 mb-3 fw-normal">Inicia sessió</h1>

            <div class="form-floating mb-2">
                <input type="text" class="form-control" id="username" placeholder="Usuari">
                <label for="username">Usuari</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password">
                <label for="password">Contrasenya</label>
            </div>

            <button class="btn btn-primary w-100 py-2" type="submit">
                Entrar
            </button>

            <div id="error-msg" class="text-danger mt-2 d-none">
                Usuari o contrasenya incorrectes. Torna-ho a provar.
            </div>

        </form>

    </main>
    <div class="container">
        <footer class="py-3 my-4">
            <hr>
            </hr>
            <p class="text-center text-body-secondary">© 2025-2026 ClimaX Controller</p>
        </footer>
    </div>
</body>

</html>
